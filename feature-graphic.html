<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateBasic - Feature Graphic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f4ff;
            font-family: 'Poppins', Arial, sans-serif;
        }

        .feature-graphic {
            width: 1024px;
            height: 500px;
            background: linear-gradient(135deg, #1F3A5F 0%, #2563EB 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        /* Background decorative elements */
        .feature-graphic::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 1;
        }

        .feature-graphic::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            z-index: 1;
        }

        .content {
            display: flex;
            align-items: center;
            gap: 60px;
            z-index: 2;
            width: 100%;
        }

        .logo-section {
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-placeholder {
            width: 280px;
            height: 280px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 3px dashed #2563EB;
        }

        .placeholder-text {
            text-align: center;
            color: #2563EB;
            font-size: 14px;
            font-weight: 600;
        }

        .text-section {
            flex: 1;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .main-title {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .accent-line {
            width: 80px;
            height: 5px;
            background: linear-gradient(90deg, #FFD700, #FFC700);
            border-radius: 3px;
            margin-top: 10px;
        }

        /* Responsive for screenshot */
        @media (max-width: 1024px) {
            .feature-graphic {
                width: 100%;
                height: auto;
                aspect-ratio: 1024 / 500;
                padding: 40px;
            }

            .content {
                gap: 30px;
            }

            .logo-placeholder {
                width: 180px;
                height: 180px;
            }

            .placeholder-text {
                font-size: 12px;
            }

            .main-title {
                font-size: 48px;
            }

            .subtitle {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="feature-graphic">
        <div class="content">
            <div class="logo-section">
                <div class="logo-placeholder">
                    <div class="placeholder-text">
                        Add Your Logo<br>Here
                    </div>
                </div>
            </div>

            <div class="text-section">
                <div>
                    <h1 class="main-title">GateBasic</h1>
                    <div class="accent-line"></div>
                </div>
                <p class="subtitle">Smart Living, Simplified</p>
            </div>
        </div>
    </div>
</body>
</html>
